    <!-- Puzzle Global Logic -->
    <script>
    window.puzzleState = { board: [1,2,3,4,5,6,7,8,0], moves: 35, solved: false };
    
    window.initPuzzle = function() {
        document.getElementById('sliding-puzzle-modal').style.display='flex';
        if(window.puzzleState && window.puzzleState.solved) {
            window.renderPuzzle();
            return;
        }
        window.puzzleState = { moves: 35, board: [1,2,3,4,5,6,7,8,0], solved: false };
        let lastZeroIndex = 8;
        for(let i=0; i<100; i++){
            let zeroIdx = window.puzzleState.board.indexOf(0);
            let neighbors = [];
            if(zeroIdx%3 !== 0) neighbors.push(zeroIdx-1);
            if(zeroIdx%3 !== 2) neighbors.push(zeroIdx+1);
            if(zeroIdx >= 3) neighbors.push(zeroIdx-3);
            if(zeroIdx <= 5) neighbors.push(zeroIdx+3);
            let validNeighbors = neighbors.filter(n => n !== lastZeroIndex);
            let targetIdx = validNeighbors.length > 0 ? validNeighbors[Math.floor(Math.random()*validNeighbors.length)] : neighbors[0];
            window.puzzleState.board[zeroIdx] = window.puzzleState.board[targetIdx];
            window.puzzleState.board[targetIdx] = 0;
            lastZeroIndex = zeroIdx;
        }
        window.renderPuzzle();
    }

    window.moveTile = function(idx) {
        if(window.puzzleState.solved) return;
        let zeroIdx = window.puzzleState.board.indexOf(0);
        let isAdj = (idx === zeroIdx-1 && idx%3!==2) || (idx === zeroIdx+1 && idx%3!==0) || (idx === zeroIdx-3) || (idx === zeroIdx+3);
        if(isAdj){
            if(window.puzzleMethods && window.puzzleMethods.Jo) window.puzzleMethods.Jo("wood");
            window.puzzleState.board[zeroIdx] = window.puzzleState.board[idx];
            window.puzzleState.board[idx] = 0;
            window.puzzleState.moves--;
            window.renderPuzzle();
            window.checkWin();
        }
    }

    window.checkWin = function() {
        let currentString = window.puzzleState.board.join("");
        if(currentString === "123405678") {
            window.puzzleState.solved = true;
            window.renderPuzzle();
            if(window.puzzleMethods) window.puzzleMethods.Qo("As runas se encaixaram com um estalo metálico perfeito, mas o buraco central permanece vazio. O mecanismo pede uma peça matriz redonda.");
        } else if (window.puzzleState.moves <= 0) {
            if(window.puzzleMethods) {
                window.puzzleMethods.Qo("As runas perdem o alinhamento e o mecanismo sofre um reset violento! Tente mover com mais sabedoria.");
            }
            setTimeout(window.initPuzzle, 1500); 
        }
    }

    window.clickCenter = function() {
        if(!window.puzzleState.solved) {
            window.moveTile(4);
            return;
        }
        let activeTool = window.getEt();
        if(activeTool === "Olho_Nimue") {
            if(window.puzzleMethods) window.puzzleMethods.Qo("A pedra de ônix se encaixa perfeitamente no centro, mas permanece inerte. Falta alguma centelha ou energia para ativá-la.");
        } else if (activeTool === "Olho_Aberto") {
            if(window.puzzleMethods) {
                window.puzzleMethods.Jo("magic");
                window.puzzleMethods.Qo("O Olho de Ônix canaliza a luz do Sol! As runas queimam em dourado e o fundo da gaveta desliza, revelando um fundo falso.");
                document.getElementById('sliding-puzzle-modal').style.display='none';
                // Cria e adiciona a Carta 
                const matCarta = window.puzzleMethods.er("/vintage_paper.png");
                const carta = {id:"Carta_Forja", type:"clue", title:"A Carta da Forja Real", icon:"/vintage_paper.png", mat: matCarta, dim:[2,2.5], sound:"paper", flyOrigin: new window.puzzleMethods.D(0,0,1)};
                window.It.clues.push(carta); 
                window.It.tools = window.It.tools.filter(x => x.id !== "Olho_Aberto");
                window.setEt(null);
                window.puzzleMethods.Ri();
                window.puzzleMethods.Mr("A passagem secreta da gaveta concedeu a Carta da Forja Real!", "hotspot-gaveta");
            }
        } else {
            if(window.puzzleMethods) {
                const hint = window.getEt() ? "Isso não parece ter utilidade aqui. Talvez outra ferramenta ou uma combinação diferente sirva." : "O espaço central é precisamente redondo e tem sulcos arcanos. A ferramenta em suas mãos não se encaixa ali.";
                window.puzzleMethods.Qo(hint);
            }
        }
    }

    window.renderPuzzle = function() {
        let movesEl = document.getElementById('puzzle-moves');
        if(window.puzzleState.solved) {
            movesEl.innerText = "Mecanismo Travado e Alinhado.";
            movesEl.style.color = "gold";
        } else {
            movesEl.innerText = "Chances restantes: " + window.puzzleState.moves;
            movesEl.style.color = window.puzzleState.moves <= 5 ? "red" : "#ddd";
        }
        let grid = document.getElementById('puzzle-grid');
        grid.innerHTML = "";
        for(let i=0; i<9; i++){
            let val = window.puzzleState.board[i];
            let div = document.createElement("div");
            div.style.width = "100px";
            div.style.height = "100px";
            div.style.display = "flex";
            div.style.alignItems = "center";
            div.style.justifyContent = "center";
            div.style.fontSize = "32px";
            div.style.fontFamily = "'IM Fell English', serif";
            div.style.userSelect = "none";
            div.style.borderRadius = "4px";
            if(val === 0){
                div.style.background = window.puzzleState.solved ? "radial-gradient(circle, #2d2012, #111)" : "#131313";
                div.style.boxShadow = window.puzzleState.solved ? "inset 0 0 15px #966b26" : "inset 0 0 10px #000";
                div.style.border = "1px solid #111";
                div.style.cursor = "crosshair";
                div.onclick = () => window.clickCenter();
            } else {
                div.style.background = "#3c3328";
                div.style.color = window.puzzleState.solved ? "gold" : "#b09c80";
                div.style.border = "2px solid #231c15";
                div.style.borderTop = "2px solid #5a4b3c";
                div.style.borderLeft = "2px solid #5a4b3c";
                div.innerText = ["I","II","III","IV","V","VI","VII","VIII","IX"][val-1];
                div.style.textShadow = "1px 1px 2px black";
                div.style.cursor = "pointer";
                div.onclick = () => window.moveTile(i);
            }
            grid.appendChild(div);
        }
    }
    </script>

    <script>
      window.openWindowModal = function() {
          let et = window.getEt ? window.getEt() : null;
          if (et === "Lupa") {
              if(window.puzzleMethods) window.puzzleMethods.Qo("O vidro está embaçado demais. Uma lente de aumento não ajuda no escuro.");
              return;
          }
          if (et === "ChaveDeFenda") {
              if(window.puzzleMethods) window.puzzleMethods.Qo("A armação da báscula está soldada pela ferrugem. Não há como desmontá-la.");
              return;
          }
          document.getElementById('window-modal').style.display='flex';
          let textLayer = document.getElementById('window-hidden-text');
          if (et === "Lanterna") {
              textLayer.style.opacity = "1";
          } else {
              textLayer.style.opacity = "0";
          }
      }
      window.closeWindowModal = function() {
          document.getElementById('window-modal').style.display='none';
      }
      window.updateWindowMask = function(e) {
          let frame = document.getElementById('window-frame');
          let rect = frame.getBoundingClientRect();
          let x = e.clientX - rect.left;
          let y = e.clientY - rect.top;
          let textLayer = document.getElementById('window-hidden-text');
          if (textLayer && (textLayer.style.opacity === "1" || window.getComputedStyle(textLayer).opacity === "1")) {
              textLayer.style.setProperty('--cursor-x', x + 'px');
              textLayer.style.setProperty('--cursor-y', y + 'px');
          }
      }

      // Reactive observer to handle equipping tools while the modal is already open
      const toolObserver = new MutationObserver(function(mutations) {
          mutations.forEach(function(mutation) {
              if (mutation.attributeName === "data-tool") {
                  let tool = document.body.getAttribute("data-tool");
                  let textLayer = document.getElementById('window-hidden-text');
                  if (textLayer) {
                      textLayer.style.opacity = (tool === "Lanterna") ? "1" : "0";
                  }
              }
          });
      });
      toolObserver.observe(document.body, { attributes: true });

      // Dust Particles Script
      const dustCanvas = document.getElementById('vfx-dust-canvas');
      const ctx = dustCanvas.getContext('2d');
      let particles = [];
      
      function resizeCanvas() {
        dustCanvas.width = dustCanvas.offsetWidth;
        dustCanvas.height = dustCanvas.offsetHeight;
      }
      window.addEventListener('resize', resizeCanvas);
      setTimeout(resizeCanvas, 100);

      class DustMole {
        constructor() {
          this.reset();
          this.y = Math.random() * (dustCanvas.height * 0.4); 
        }
        reset() {
          let w = dustCanvas.width || window.innerWidth;
          let h = dustCanvas.height || window.innerHeight;
          this.x = w * (0.08 + Math.random() * 0.15); // near window
          this.y = h * (0.15 + Math.random() * 0.15); 
          this.vx = (Math.random() - 0.3) * 0.3; // drift slightly right
          this.vy = -(Math.random() * 0.3 + 0.1); // float UP
          this.radius = Math.random() * 1.5 + 0.5;
          this.alpha = 0; 
          this.maxAlpha = Math.random() * 0.4 + 0.1;
          this.life = 0;
        }
        update() {
          this.x += this.vx;
          this.y += this.vy;
          this.life++;
          
          if (this.life < 50 && this.alpha < this.maxAlpha) this.alpha += 0.01;
          else if (this.y < (dustCanvas.height || window.innerHeight) * 0.05) this.alpha -= 0.005;
          else if (this.life > 300) this.alpha -= 0.005;
          
          if (this.alpha < 0 && this.life > 50) this.reset();
        }
        draw() {
          if (this.alpha <= 0) return;
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(200, 230, 255, ${this.alpha})`;
          ctx.fill();
        }
      }

      for(let i=0; i<40; i++) particles.push(new DustMole());

      function animateDust() {
        ctx.clearRect(0, 0, dustCanvas.width, dustCanvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animateDust);
      }
      setTimeout(animateDust, 300);
    </script>

    <script>
    (function patchSoloMode() {

        function entrarSolo() {

            var lobbyScreen = document.getElementById('lobby-screen');
            var chatContainer = document.getElementById('chat-container');
            var notification = document.getElementById('notification');
            if (lobbyScreen) lobbyScreen.style.display = 'none';
            if (chatContainer) chatContainer.style.display = 'flex';
            if (notification) {
                notification.innerText = 'Modo Solo Ativo';
                notification.classList.add('show');
                setTimeout(function(){ notification.classList.remove('show'); }, 3000);
            }
        }
        function watchLobby() {
            var lobbyScreen = document.getElementById('lobby-screen');
            if (!lobbyScreen) return;
            var observer = new MutationObserver(function(muts) {
                muts.forEach(function(m) {
                    if (m.attributeName === 'style') {
                        var s = lobbyScreen.style.display;
                        if (s === 'none' || s === '') { clearTimeout(_soloTimer); observer.disconnect(); }
                    }
                });
            });
            observer.observe(lobbyScreen, { attributes: true });
            var grid = document.getElementById('char-selection-grid');
            if (grid) {
                var gridObserver = new MutationObserver(function() {
                    if (grid.innerHTML.indexOf('Conectando') !== -1) {
                        clearTimeout(_soloTimer);
                        _soloTimer = setTimeout(function() {
                            var ls = document.getElementById('lobby-screen');
                            if (ls && ls.style.display !== 'none') {
                                entrarSolo(); observer.disconnect(); gridObserver.disconnect();
                            }
                        }, 4000);
                    }
                });
                gridObserver.observe(grid, { childList: true, subtree: true, characterData: true });
            }
        }
        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', watchLobby);
        else watchLobby();
    })();
    </script>

    <!-- ===== STATE MACHINE: SISTEMA DE INTERAÇÕES DO JOGO ===== -->
    <script id="game-state-machine">
    'use strict';

    // ─────────────────────────────────────────────────────────────
    // 1. ESTADO GLOBAL DO JOGO
    // ─────────────────────────────────────────────────────────────
    window.GameState = {
        activeTool: null,   // ID da ferramenta equipada (lido de data-tool)
        inventory:  [],     // IDs de todos os itens já coletados
        states: {
            grateOpen:       false,       // Placa de metal aberta?
            chestOpen:       false,       // Baú aberto?
            onyxEyeState:    'scene',     // 'scene' | 'inventory_closed' | 'inventory_open'
            puzzleSolved:    false,       // Quebra-cabeça resolvido?
            scrollCollected: false,       // Pergaminho de Edgar coletado?
            lupaCollected:   false,       // Lupa coletada?
        }
    };

    // Fonte de verdade da ferramenta ativa: usa data-tool do body (definido pelo motor 3D)
    // com fallback para GameState.activeTool
    function _getActiveTool() {
        return document.body.getAttribute('data-tool') || window.GameState.activeTool || null;
    }

    // ─────────────────────────────────────────────────────────────
    // 2. GAME API — Bridge para puzzleMethods (funciona sem ele)
    // ─────────────────────────────────────────────────────────────

    // Motor de dicas: exibe texto temporário na UI
    window.showHint = function(msg) {
        if (window.puzzleMethods && window.puzzleMethods.Qo) {
            window.puzzleMethods.Qo(msg);
        } else {
            var hc = document.getElementById('hint-container');
            var ht = document.getElementById('hint-text');
            if (hc && ht) {
                ht.textContent = msg;
                hc.classList.remove('hidden');
                clearTimeout(window._hintTimer);
                window._hintTimer = setTimeout(function() { hc.classList.add('hidden'); }, 6000);
            } else {
                // fallback absoluto
                console.info('[HINT]', msg);
            }
        }
    };

    // Registra ação no Diário de Mesa
    function _logAction(msg, itemId) {
        // Mr() já renderiza no #chat-list via Zo() — retornar aqui evita duplicação
        if (window.puzzleMethods && window.puzzleMethods.Mr) {
            window.puzzleMethods.Mr(msg, itemId || null);
            return;
        }
        // Fallback: só quando puzzleMethods ainda não carregou
        var chatList = document.getElementById('chat-list');
        if (chatList) {
            var li = document.createElement('li');
            li.innerHTML = msg;
            chatList.appendChild(li);
            chatList.scrollTop = chatList.scrollHeight;
        }
    }

    // Toca som do motor
    function _playSound(type) {
        if (window.puzzleMethods && window.puzzleMethods.Jo) window.puzzleMethods.Jo(type);
    }

    // Adiciona item ao inventário com retry (aguarda motor carregar)
    // onSuccess: callback chamado UMA VEZ após inserção confirmada (para _logAction)
    function _addItem(item, grid, onSuccess, tries) {
        tries = tries || 0;
        var pm = window.puzzleMethods;
        var inv = window.It;
        if (pm && pm.Ri && inv && inv[grid]) {
            // Monta material 3D se ainda não tiver
            if (!item.mat && pm.er) item.mat = pm.er(item.icon);
            if (!item.flyOrigin && pm.D && item._origin)
                item.flyOrigin = new pm.D(item._origin[0], item._origin[1], item._origin[2]);
            var exists = inv[grid].some(function(x) { return x.id === item.id; });
            if (!exists) {
                inv[grid].push(item);
                pm.Ri();
                // Marca no inventário de IDs
                if (window.GameState.inventory.indexOf(item.id) === -1)
                    window.GameState.inventory.push(item.id);
            }
            // Limpa pending independente de dup ou novo
            if (window.GameState._pending) delete window.GameState._pending[item.id];
            // Dispara callback só para inserção nova (não para duplicatas ignoradas)
            if (!exists && typeof onSuccess === 'function') onSuccess();
        } else if (tries < 40) {
            setTimeout(function() { _addItem(item, grid, onSuccess, tries + 1); }, 250);
        } else {
            // Retries esgotados — limpa pending para não bloquear o hotspot para sempre
            if (window.GameState._pending) delete window.GameState._pending[item.id];
        }
    }

    // Remove item do inventário
    function _removeItem(itemId) {
        if (window.It) {
            ['tools','clues','loot'].forEach(function(grid) {
                if (window.It[grid]) window.It[grid] = window.It[grid].filter(function(x){ return x.id !== itemId; });
            });
        }
        // Sincroniza GameState.inventory (Fix 4)
        var _gs = window.GameState;
        var idx = _gs.inventory.indexOf(itemId);
        if (idx !== -1) _gs.inventory.splice(idx, 1);
        // Limpa pending caso o item estivesse aguardando inserção
        if (_gs._pending) delete _gs._pending[itemId];
        // Desequipa se estava ativo
        if (_getActiveTool() === itemId) {
            document.body.setAttribute('data-tool', '');
            _gs.activeTool = null;
            if (window.setEt) window.setEt(null);
        }
        if (window.puzzleMethods && window.puzzleMethods.Ri) window.puzzleMethods.Ri();
    }

    // ─────────────────────────────────────────────────────────────
    // 3. HANDLERS DE HOTSPOT
    // ─────────────────────────────────────────────────────────────

    // ── A. CHAVE DE FENDA (hotspot-fenda) ────────────────────────
    window.handleFendaClick = function() {
        var GS = window.GameState;
        GS._pending = GS._pending || {};
        // Guard unificado: já coletado OU coleta em andamento
        if (GS.inventory.indexOf('chave_de_fenda') !== -1 || GS._pending['chave_de_fenda']) {
            showHint('A Chave de Fenda já foi removida do suporte. Você deveria tê-la no inventário.');
            return;
        }
        GS._pending['chave_de_fenda'] = true;
        _playSound('wood');
        showHint('Você pega a Chave de Fenda enferrujada do suporte de ferro forjado. Ela pesa mais do que parece.');
        _addItem({
            id: 'chave_de_fenda',
            type: 'tool',
            title: 'Chave de Fenda',
            icon: '/screwdriver.png',
            dim: [1, 1.5],
            sound: 'wood',
            _origin: [0.59, 0.44, 0.5]
        }, 'tools', function() {
            _logAction('🔧 Chave de Fenda coletada do suporte.', 'chave_de_fenda');
        });
    };
    // backward-compat alias
    window.interagirChaveVenda = window.handleFendaClick;

    // ── B. GRADE DE METAL / PLACA (hotspot-placa) ────────────────
    window.handleGrateClick = function() {
        var GS = window.GameState;
        GS._pending = GS._pending || {};

        if (GS.states.grateOpen || GS._pending['moeda_sol']) {
            showHint('A grade já foi removida. O compartimento atrás dela permanece vazio.');
            return;
        }

        var tool = _getActiveTool();

        if (tool !== 'chave_de_fenda') {
            showHint('Há algo metálico tilintando atrás desta grade, mas o painel está preso por parafusos minúsculos. Meus dedos não cabem ali.');
            return;
        }

        // ✅ ferramenta correta
        GS.states.grateOpen = true;
        GS._pending['moeda_sol'] = true;
        _playSound('metal');
        showHint('Com a Chave de Fenda você afrouxou os parafusos da grade! Uma Moeda do Sol cai do compartimento oculto atrás dela.');
        _addItem({
            id: 'moeda_sol',
            type: 'tool',
            title: 'Moeda do Sol',
            icon: '/sol_coin.png',
            dim: [1, 1],
            sound: 'metal',
            _origin: [0.62, 0.25, 0.5]
        }, 'tools', function() {
            _logAction('☀️ Grade aberta com a Chave de Fenda! Moeda do Sol adicionada ao inventário.', 'moeda_sol');
        });
    };
    // backward-compat alias
    window.interagirGrade = window.handleGrateClick;

    // ── C. BAÚ DE MADEIRA (hotspot-bau) ──────────────────────────
    window.handleChestClick = function() {
        var GS = window.GameState;
        GS._pending = GS._pending || {};

        if (GS.states.chestOpen || GS._pending['lanterna_sol']) {
            showHint('O baú já está aberto e vazio. A Lanterna do Sol foi retirada.');
            return;
        }

        var tool = _getActiveTool();

        if (tool !== 'moeda_sol') {
            showHint('O baú está trancado. Não há uma fechadura comum — apenas uma fenda estreita e circular no topo, do exato tamanho de uma moeda.');
            return;
        }

        // ✅ Moeda do Sol equipada
        GS.states.chestOpen = true;
        GS._pending['lanterna_sol'] = true;
        _removeItem('moeda_sol');
        _playSound('metal');
        showHint('A Moeda do Sol desliza perfeitamente na fenda — um clique mecânico ressoa e o cadeado cede. Dentro do baú, embrulhada em veludo negro, estava a Lanterna do Sol.');
        _addItem({
            id: 'lanterna_sol',
            type: 'tool',
            title: 'Lanterna do Sol',
            icon: '/lantern.png',
            dim: [1, 1.5],
            sound: 'metal',
            _origin: [0.18, 0.68, 0.5]
        }, 'tools', function() {
            _logAction('🔦 Baú aberto com a Moeda do Sol! Lanterna do Sol adicionada ao inventário.', 'lanterna_sol');
        });
    };
    // backward-compat alias
    window.interagirBau = window.handleChestClick;

    // ── D. JANELA AO FUNDO (hotspot-janela) ──────────────────────
    window.handleWindowClick = function() {
        var tool = _getActiveTool();
        var modal = document.getElementById('window-modal');
        var textLayer = document.getElementById('window-hidden-text');
        if (!modal) return;

        modal.style.display = 'flex';

        if (tool === 'lanterna_sol') {
            // Com a lanterna: ativa spotlight/masking
            if (textLayer) textLayer.style.opacity = '1';
            showHint('A luz da Lanterna do Sol dissolve a névoa suja do vidro. Palavras surgem gravadas na superfície interna.');
        } else {
            // Sem lanterna
            if (textLayer) textLayer.style.opacity = '0';
            showHint('O vidro está coberto por poeira. A luz da anomalia mal penetra. Preciso de uma fonte de luz mais poderosa.');
        }
    };
    // mantém openWindowModal funcionando
    window.openWindowModal = window.handleWindowClick;

    // ── E. PERGAMINHO DE EDGAR (hotspot-pergaminho) ──────────────
    window.handleScrollClick = function() {
        var GS = window.GameState;
        GS._pending = GS._pending || {};
        var tool = _getActiveTool();

        if (!GS.states.scrollCollected && !GS._pending['carta_edgar']) {
            GS.states.scrollCollected = true;
            GS._pending['carta_edgar'] = true;
            _playSound('paper');
            _addItem({
                id: 'carta_edgar',
                type: 'clue',
                title: 'Carta de Edgar',
                icon: '/vintage_paper.png',
                dim: [2, 2.5],
                sound: 'paper',
                _origin: [0.62, 0.59, 0.5]
            }, 'clues', function() {
                _logAction('📜 Carta de Edgar coletada da mesa.', 'carta_edgar');
            });
        }

        // Feedback visual imediato (independente da coleta)
        if (tool === 'lupa') {
            showHint('Sob a lente da lupa, certas palavras do manuscrito mudam — "caravana" torna-se "fuga", "destino" torna-se "armadilha".');
        } else {
            showHint('O papel sussurra ao ser tocado. Diagramas de constelações latejem, ocultando verdades que sua mente luta para decifrar. Precise uma lente.');
        }
    };

    // ── F. LUPA (hotspot-lupa) ───────────────────────────────────
    window.handleLupaClick = function() {
        var GS = window.GameState;
        GS._pending = GS._pending || {};
        // Guard unificado: já coletado OU coleta em andamento
        if (GS.inventory.indexOf('lupa') !== -1 || GS._pending['lupa']) {
            showHint('Sua lente de aumento. Essencial para revelar o que a vista desarmada ignora na penumbra.');
            return;
        }
        GS.states.lupaCollected = true;
        GS._pending['lupa'] = true;
        _playSound('metal');
        showHint('Você pega a lupa de latão da mesa. A lente grossa aumenta tudo dramáticamente.');
        _addItem({
            id: 'lupa',
            type: 'tool',
            title: 'Lupa de Latão',
            icon: '/magnifier.png',
            dim: [1, 1],
            sound: 'metal',
            _origin: [0.73, 0.63, 0.5]
        }, 'tools', function() {
            _logAction('🔍 Lupa de Latão coletada.', 'lupa');
        });
    };

    // ── G. OLHO DE ÔNIX na parede (hotspot-olho) ─────────────────
    window.handleOnyxClick = function() {
        var GS = window.GameState;
        GS._pending = GS._pending || {};

        if (GS.states.onyxEyeState !== 'scene' || GS._pending['olho_onix_fechado']) {
            showHint('A pedra de ônix já foi retirada da parede. Ela deve estar no inventário.');
            return;
        }

        var tool = _getActiveTool();

        if (tool !== 'pinca') {
            showHint('A pedra está encravada num buraco estreito e liso. Meus dedos escorregam — preciso de uma pinça ou ferramenta similar.');
            return;
        }

        // ✅ Com a pinça
        GS.states.onyxEyeState = 'inventory_closed';
        GS._pending['olho_onix_fechado'] = true;
        _playSound('metal');
        showHint('Com a pinça, você extrai a pedra de ônix polida da cavidade na parede. Ela é fria e parece absorver a luz ao redor.');
        _addItem({
            id: 'olho_onix_fechado',
            type: 'tool',
            title: 'Olho de Ônix (Fechado)',
            icon: '/onyx_eye.png',
            dim: [1, 1],
            sound: 'metal',
            _origin: [0.82, 0.14, 0.5]
        }, 'tools', function() {
            _logAction('👁️ Olho de Ônix retirado da parede com a pinça.', 'olho_onix_fechado');
        });
    };

    // Combinação: Olho Fechado + Lanterna no inventário → Olho Aberto
    window.handleOnyxInventoryClick = function() {
        var GS = window.GameState;
        GS._pending = GS._pending || {};
        if (GS.states.onyxEyeState !== 'inventory_closed' || GS._pending['olho_onix_aberto']) return;

        var tool = _getActiveTool();
        if (tool !== 'lanterna_sol') {
            showHint('A pedra de ônix permanece inerte. Talvez a luz certa a desperte.');
            return;
        }

        GS.states.onyxEyeState = 'inventory_open';
        GS._pending['olho_onix_aberto'] = true;
        _removeItem('olho_onix_fechado');
        _playSound('magic');
        showHint('A luz da Lanterna do Sol atravessa o ônix — a pedra pulsa em verde esmeralda, revelando uma íris brilhante. O Olho despertou.');
        _addItem({
            id: 'olho_onix_aberto',
            type: 'tool',
            title: 'Olho de Ônix (Ativo)',
            icon: '/onyx_eye_open.png',
            dim: [1, 1],
            sound: 'magic',
            _origin: [0, 0, 0]
        }, 'tools', function() {
            _logAction('✨ Olho de Ônix ativado pela Lanterna do Sol!');
        });
    };

    // ── H. GAVETA DA ESCRIVANINHA (hotspot-gaveta) ───────────────
    window.handleDrawerClick = function() {
        // Sync GameState com puzzleState para o centro do tabuleiro
        if (window.puzzleState && window.puzzleState.solved) {
            window.GameState.states.puzzleSolved = true;
        }
        if (window.initPuzzle) window.initPuzzle();
    };

    // Override do clickCenter para usar GameState
    var _origClickCenter = window.clickCenter;
    window.clickCenter = function() {
        var GS = window.GameState;
        GS._pending = GS._pending || {};
        if (!window.puzzleState || !window.puzzleState.solved) {
            if (window.moveTile) window.moveTile(4);
            return;
        }
        GS.states.puzzleSolved = true;

        var tool = _getActiveTool();

        if (tool === 'olho_onix_fechado') {
            showHint('A pedra de ônix se encaixa perfeitamente no centro, mas permanece inerte. Falta energia — talvez precise ser ativada primeiro.');
        } else if (tool === 'olho_onix_aberto') {
            if (GS._pending['carta_forja']) return;
            GS._pending['carta_forja'] = true;
            _playSound('magic');
            showHint('O Olho de Ônix canaliza a luz! As runas queimam em dourado e o fundo da gaveta desliza, revelando um fundo falso.');
            document.getElementById('sliding-puzzle-modal').style.display = 'none';
            _removeItem('olho_onix_aberto');
            _addItem({
                id: 'carta_forja',
                type: 'clue',
                title: 'Carta da Forja Real',
                icon: '/vintage_paper.png',
                dim: [2, 2.5],
                sound: 'paper',
                _origin: [0, 0, 1]
            }, 'clues', function() {
                _logAction('📜 Carta da Forja Real revelada pela gaveta secreta!', 'carta_forja');
            });
        } else {
            var hint = tool
                ? 'Isso não parece se encaixar aqui. O mecanismo pede algo circular de origem arcana.'
                : 'O espaço central é precisamente redondo, com sulcos arcanos. Nada em suas mãos se encaixa ali.';
            showHint(hint);
        }
    };

    // ─────────────────────────────────────────────────────────────
    // 4. ALIASES BACKWARD-COMPAT (puzzleState integrado)
    // ─────────────────────────────────────────────────────────────
    // Sync onyxEyeState aliases usados pelo motor existente
    Object.defineProperty(window.GameState.states, 'onyxEyeState', {
        get: function() { return this._onyxEyeState || 'scene'; },
        set: function(v) {
            this._onyxEyeState = v;
            // Atualiza aliases para motor existente
            window.Olho_Nimue   = (v === 'inventory_closed');
            window.Olho_Aberto  = (v === 'inventory_open');
        },
        configurable: true
    });

    </script>
